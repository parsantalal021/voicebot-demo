[build]
builder = "NIXPACKS"
 
[build.nixpacksPlan.phases.setup]
nixPkgs = ["python312"]
 
[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
 
[[volumes]]
mountPath = "/app/data"